extensions:
  health_check:
  
  # FIX 1: Make the Observer fast so it releases files immediately
  docker_observer:
    endpoint: "unix:///var/run/docker.sock"
    cache_sync_interval: 5s  

receivers:
  otlp:
    protocols:
      grpc: { endpoint: "0.0.0.0:4317" }
      http: { endpoint: "0.0.0.0:4318" }

  docker_stats:
    endpoint: "unix:///var/run/docker.sock"
    collection_interval: 10s
    api_version: "1.44"
    metric_labels_to_resource_attributes:
      com.docker.swarm.service.name: "service.name"
      com.docker.stack.namespace: "stack.name"

  receiver_creator:
    watch_observers: [docker_observer]
    receivers:
      filelog:
        rule: type == "container" and labels["io.otel.skip_file_logs"] != "true"
        config:
          include: 
            - "/var/lib/docker/containers/`container_id`/`container_id`-json.log"
          include_file_name: false
          
          # FIX 2: Disable writing checkpoint files to disk
          storage: null 
          
          operators:
            - type: json_parser
              timestamp: { parse_from: attributes.time, layout: '%Y-%m-%dT%H:%M:%S.%LZ' }
              severity: { parse_from: attributes.stream, mapping: { info: stdout, error: stderr } }
            - type: move
              from: attributes.log
              to: body
            - type: remove
              field: attributes.time
            - type: remove
              field: attributes.stream
          exclude:
            - "/var/lib/docker/containers/*otel-collector*/*-json.log"

processors:
  # FIX 3: Corrected Syntax for Resource Attributes
  # The processor uses dot notation, not bracket ["..."] notation.
  resource:
    attributes:
      - key: service.name
        action: upsert
        from_attribute: "container.labels.com.docker.swarm.service.name"
      - key: stack.name
        action: upsert
        from_attribute: "container.labels.com.docker.stack.namespace"

  transform/logs:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - merge_maps(attributes, ParseJSON(body), "upsert") where IsMatch(body, "^\\{")
          - delete_key(attributes, "_timestamp") where attributes["_timestamp"] != nil

  batch:
    timeout: 5s

exporters:
  otlp/openobserve:
    endpoint: "openobserve:5081"
    tls: { insecure: true }
    headers:
      Authorization: "__BASIC_AUTH_PLACEHOLDER__"
      organization: "default"

service:
  extensions: [health_check, docker_observer]
  telemetry:
    logs:
      level: warn
  pipelines:
    logs:
      receivers: [receiver_creator, otlp]
      processors: [resource, transform/logs, batch]
      exporters: [otlp/openobserve]

    metrics:
      receivers: [docker_stats, receiver_creator, otlp]
      processors: [resource, batch]
      exporters: [otlp/openobserve]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/openobserve]